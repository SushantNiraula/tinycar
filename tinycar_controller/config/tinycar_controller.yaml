controller_manager:
  ros__parameters:
    update_rate: 50

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

diff_drive_controller:
  ros__parameters:
    
    odom_frame_id: odom
    base_frame_id: base_footprint
    enable_odom_tf: true
    publish_rate: 50.0

    use_stamped_vel: false

    # 6-wheel skid steer: 3 wheels per side
    left_wheel_names:
      - left_wheel_joint
    right_wheel_names:
      - right_wheel_joint
    # MUST match your real robot later. For now, use your xacro properties if you want.
    wheel_separation: 0.143
    wheel_radius: 0.022

    pose_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.01]

    linear.x.has_velocity_limits: true
    linear.x.max_velocity: 0.5
    angular.z.has_velocity_limits: true
    angular.z.max_velocity: 1.0